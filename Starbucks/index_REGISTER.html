<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Starbucks Rewards</title>
    <link rel="stylesheet" href="styles3.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">Starbucks Rewards</div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="main-container">

        <div class="register-box">

            <h1>¡Regístrate y comienza a vivir la experiencia Starbucks Rewards™!</h1>

            <h2>Información personal</h2>

            <form>

                <div class="form-group">
                    <label>Nombre(s)</label>
                    <input type="text" placeholder="Nombre(s)*">
                </div>

                <div class="form-group">
                    <label>Apellido paterno</label>
                    <input type="text" placeholder="Apellido paterno*">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Email*">
                </div>

                <div class="form-group">
                    <label>Confirmar Email</label>
                    <input type="email" placeholder="Confirmar Email*">
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="Contraseña*">
                </div>

                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" placeholder="Confirmar contraseña*">
                </div>

                <!-- FECHA DE NACIMIENTO -->
                <div class="birthday">
                    <p>Fecha de Nacimiento (Opcional)</p>

                    <div class="birthday-inputs">
                        <input type="text" placeholder="Mes">
                        <input type="text" placeholder="Día">
                    </div>
                </div>

                <!-- SECCION TARJETA -->
                <div class="card-options">

                    <h2>Ingresa a Starbucks Rewards</h2>

                    <div class="option">
                        <input type="radio" name="card">
                        <label>Quiero recibir una Starbucks Card digital instantánea</label>
                    </div>

                    <div class="option">
                        <input type="radio" name="card">
                        <label>Quiero unirme con una Starbucks Card que ya tengo</label>
                    </div>

                </div>

                <!-- CHECKBOXES -->
                <div class="checkboxes">

                    <div class="option">
                        <input type="checkbox">
                        <label>Deseo recibir novedades sobre productos y promociones</label>
                    </div>

                    <div class="option">
                        <input type="checkbox">
                        <label>Acepto los Términos y Condiciones y Aviso de Privacidad</label>
                    </div>

                </div>

                <!-- BOTON -->
                <div class="button-area">
                    <button type="submit">Registrarme</button>
                </div>

            </form>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© Starbucks Rewards México</p>
    </footer>

</body>
</html>
